# Local PostgreSQL — matches backend/.env.example database name and user.
# From backend/: docker compose -f docker-compose.postgres.yml up -d
# Then: php artisan migrate

services:
  postgres:
    image: postgres:16-alpine
    container_name: myscriptic-postgres
    environment:
      POSTGRES_DB: myscriptic
      POSTGRES_USER: myscriptic
      POSTGRES_PASSWORD: myscriptic
    ports:
      - "5432:5432"
    volumes:
      - myscriptic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myscriptic -d myscriptic"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  myscriptic_pgdata:
