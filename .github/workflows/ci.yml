name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Production build
        env:
          NEXT_PUBLIC_SITE_URL: https://www.myscriptic.com
          NEXT_PUBLIC_API_URL: https://api.myscriptic.com
          NEXT_PUBLIC_USE_LARAVEL_AUTH: "true"
          NEXT_PUBLIC_USE_LARAVEL_PHASE2: "true"
          NEXT_PUBLIC_USE_LARAVEL_PHASE3: "true"
          NEXT_PUBLIC_USE_LARAVEL_COURSES: "true"
          NEXT_PUBLIC_CMS_FROM_API: "true"
        run: npm run build
